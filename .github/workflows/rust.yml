name: Rust CI (Linux Secure)

on:
  push:
    branches: ["main", "*"]   # ✅ works on fork main + any branch
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"   # 🔥 fail-safe (no warnings allowed)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🦀 Install Rust + components
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ⚡ Cache dependencies
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # 🧹 Format check
      - name: Check formatting
        run: cargo fmt --all -- --check

      # 🔍 Clippy (strict)
      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      # 🔐 Fast security audit
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit

      # 🏗️ Build release (optimized)
      - name: Build release
        run: cargo build --release --locked

      # 🧪 Run tests
      - name: Run tests
        run: cargo test --all --verbose --locked

      # 📦 Upload ONLY binary artifact
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: brutecraber-linux
          path: target/release/brutecraber
