name: Rust Manual CI/CD

on:
  workflow_dispatch:   # 🔥 manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Build release
      - name: Build
        run: cargo build --release

      # Upload artifact
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: brutecraber-linux
          path: target/release/brutecraber

      # Optional: create release manually
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-release-${{ github.run_number }}
          name: Manual Release ${{ github.run_number }}
          files: target/release/brutecraber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
